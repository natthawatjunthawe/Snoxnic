<!DOCTYPE html><html lang="en" translate="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><link rel="manifest" href="manifest.json"><title>Nyttory</title><style>:root{--bg:#0f172a;--card:#1e293b;--txt:#f8fafc;--sub:#94a3b8;--act:#3b82f6;--brd:rgba(255,255,255,0.1)}*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none}body{background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:80px;overflow-x:hidden}input,textarea{user-select:text}.upd{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:.5s}.upd.on{opacity:1;pointer-events:all}.pb{width:80%;height:6px;background:var(--card);border-radius:3px;margin-top:20px;overflow:hidden}.pf{height:100%;width:0;background:var(--act);transition:.2s}.nav{background:rgba(30,41,59,.9);backdrop-filter:blur(10px);padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--brd);padding-top:max(15px,env(safe-area-inset-top))}.logo{font-size:24px;font-weight:900;color:var(--act)}.av{width:40px;height:40px;border-radius:50%;background:var(--act);display:flex;justify-content:center;align-items:center;font-weight:bold;color:#fff;background-size:cover;background-position:center;cursor:pointer}.view{display:none;padding:15px;max-width:600px;margin:0 auto}.view.on{display:block;animation:fUp .4s}.card{background:var(--card);border-radius:16px;padding:15px;margin-bottom:20px;border:1px solid var(--brd)}.inp{width:100%;background:rgba(0,0,0,.2);border:none;border-radius:12px;padding:15px;color:var(--txt);outline:none;min-height:60px;margin-bottom:10px}.btn{background:var(--act);color:#fff;border:none;p one;flex-direction:column;justify-content:center;align-items:center}.modal.on{display:flex}#crpA{width:100%;height:60vh;position:relative;overflow:hidden;background:#000;touch-action:none}#crpI{position:absolute;transform-origin:0 0;will-change:transform}.crpM{position:absolute;inset:0;pointer-events:none;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}@keyframes fUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}.ptabs{display:flex;margin-bottom:15px;border-bottom:1px solid var(--brd)}.ptab{flex:1;text-align:center;padding:10px;color:var(--sub);cursor:pointer}.ptab.on{color:var(--act);border-bottom:2px solid var(--act)}</style></head><body><div id="uScr" class="upd"><h2 id="uTxt">Syncing Data...</h2><div class="pb"><div id="uPrg" class="pf"></div></div></div><div class="nav"><div class="logo">Nyttory</div><div id="nAv" class="av">U</div></div><div id="vF" class="view on"><input type="text" id="shInp" class="inp" placeholder="Search posts..."><div class="card"><div style="display:flex;gap:10px;margin-bottom:10px"><div id="fAv" class="av">U</div><textarea id="pInp" class="inp" placeholder="What's on your mind?"></textarea></div><div style="display:flex;justify-content:flex-end"><button class="btn" id="pBtn" style="width:100px">Post</button></div></div><div id="bTyp" style="font-size:12px;color:var(--sub);margin-bottom:12px;display:none">💬 <span id="bTypT"></span></div><div id="fCon"></div></div><div id="vP" class="view"><div class="cov" id="pCov"><div class="av" id="pbAv" style="position:absolute;bottom:-40px;left:20px;width:80px;height:80px;border:4px solid var(--bg);font-size:30px">U</div></div><div class="card" style="border-radius:0 0 16px 16px;border-top:none;padding-top:50px"><div class="fg"><label>Display Name</label><input type="text" id="prN"></div><div class="fg"><label>Bio</label><input type="text" id="prB"></div><div class="fg"><label>Work/School</label><input type="text" id="prW"></div><div class="fg"><label>Relationship</label><select id="prR"><option>Single</option><option>In a relationship</option><option>Complicated</option></select></div><button class="btn" id="sPrBtn">Save Profile</button></div><div class="ptabs" id="pTbs"><div class="ptab on" onclick="sPT(0)">Posts</div><div class="ptab" onclick="sPT(1)">Saved</div></div><div id="uFCon"></div></div><div class="bnav"><div class="ni on" id="tF" onclick="sT('F')">📃</div><div class="ni" id="tP" onclick="vwPrf('me')">👤</div></div><div id="tst" class="tst"></div><div id="imgVw" class="modal" onclick="this.classList.remove('on')"><img id="ivI" style="max-width:100%;max-height:100%;object-fit:contain"><div style="position:absolute;bottom:20px;background:rgba(0,0,0,.5);padding:10px;border-radius:10px">Tap anywhere to close</div></div><div id="crpMdl" class="modal"><div id="crpA"><img id="crpI"><div class="crpM" id="crpMsk"></div></div><div style="padding:20px;width:100%;display:flex;gap:10px"><button class="btn" onclick="document.getElementById('crpMdl').classList.remove('on')" style="background:#ef4444">Cancel</button><button class="btn" id="crpBtn">Crop & Save</button></div></div><script src="app.js"></script></body></html>
